name: Docs — Sync GitHub Wiki

on:
  push:
    branches: [main, dev]
    paths: ['docs/wiki/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-github-wiki
  cancel-in-progress: true

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate wiki token
        run: |
          if [ -z "${{ secrets.GH_WIKI_TOKEN }}" ]; then
            echo "Missing GH_WIKI_TOKEN secret."
            echo "Create a classic PAT or fine-grained token with access to this repo and wiki."
            exit 1
          fi

      - name: Clone GitHub wiki repository
        env:
          GH_WIKI_TOKEN: ${{ secrets.GH_WIKI_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_WIKI_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki-repo

      - name: Sync docs/wiki into GitHub wiki
        run: |
          cp docs/wiki/*.md wiki-repo/

      - name: Rewrite links for GitHub Wiki rendering
        env:
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          python <<'PY'
          import pathlib
          import re
          import os

          repo = os.environ["REPOSITORY"]
          ref_name = os.environ["REF_NAME"]
          repo_base = f"https://github.com/{repo}/blob/{ref_name}/"
          wiki_dir = pathlib.Path("wiki-repo")

          wiki_link_pattern = re.compile(r"\]\(\./([^)]+)\.md\)")
          repo_link_pattern = re.compile(r"\]\(\.\./\.\./([^)]+)\)")

          for path in wiki_dir.glob("*.md"):
              content = path.read_text(encoding="utf-8")
              content = wiki_link_pattern.sub(r"](./\1)", content)
              content = repo_link_pattern.sub(lambda m: f"]({repo_base}{m.group(1)})", content)
              path.write_text(content, encoding="utf-8")
          PY

      - name: Commit and push if changed
        working-directory: wiki-repo
        env:
          GH_WIKI_TOKEN: ${{ secrets.GH_WIKI_TOKEN }}
        run: |
          if [ -z "$(git status --short)" ]; then
            echo "Wiki already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No staged wiki changes."
            exit 0
          fi

          git commit -m "Sync wiki from docs/wiki"
          git push "https://x-access-token:${GH_WIKI_TOKEN}@github.com/${{ github.repository }}.wiki.git" HEAD:master
