name: CD — Deploy AML Managed Endpoint

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: "3.10"

jobs:
  deploy-managed-endpoint:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env == 'prod' && 'production' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve AML context
        run: |
          if [ "${{ github.event.inputs.target_env }}" = "prod" ]; then
            echo "AML_RESOURCE_GROUP=${{ secrets.AML_RESOURCE_GROUP_PROD }}" >> $GITHUB_ENV
            echo "AML_WORKSPACE=${{ secrets.AML_WORKSPACE_PROD }}" >> $GITHUB_ENV
          else
            echo "AML_RESOURCE_GROUP=${{ secrets.AML_RESOURCE_GROUP_DEV }}" >> $GITHUB_ENV
            echo "AML_WORKSPACE=${{ secrets.AML_WORKSPACE_DEV }}" >> $GITHUB_ENV
          fi

      - name: Bootstrap AML assets
        run: |
          bash scripts/bootstrap-aml.sh \
            "${{ github.event.inputs.target_env }}" \
            "$AML_RESOURCE_GROUP" \
            "$AML_WORKSPACE" \
            true

      - name: Create or update AML inference environment
        run: |
          az configure --defaults group="$AML_RESOURCE_GROUP" workspace="$AML_WORKSPACE"
          az ml environment create --file mlops/data-science/environment/inference-env.yml

      - name: Train local model and run quality gate
        run: |
          python mlops/data-science/src/prep.py --output_dir /tmp/iris-endpoint
          python mlops/data-science/src/train.py --data_dir /tmp/iris-endpoint --model_dir /tmp/model-endpoint
          python mlops/data-science/src/evaluate.py --data_dir /tmp/iris-endpoint --model_dir /tmp/model-endpoint --min_accuracy 0.90

      - name: Register model in AML
        run: |
          export AML_RESOURCE_GROUP="$AML_RESOURCE_GROUP"
          export AML_WORKSPACE="$AML_WORKSPACE"
          export AZURE_SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          python mlops/data-science/src/register.py \
            --model_dir /tmp/model-endpoint \
            --environment "${{ github.event.inputs.target_env }}" \
            --accuracy "0.90"

      - name: Deploy managed endpoint + deployment
        run: |
          TARGET="${{ github.event.inputs.target_env }}"
          ENDPOINT_NAME="iris-endpoint-${TARGET}"
          DEPLOYMENT_NAME="iris-deployment-${TARGET}"

          az configure --defaults group="$AML_RESOURCE_GROUP" workspace="$AML_WORKSPACE"

          if az ml online-endpoint show --name "$ENDPOINT_NAME" >/dev/null 2>&1; then
            az ml online-endpoint update \
              --file mlops/pipelines/online-endpoint.yml \
              --name "$ENDPOINT_NAME"
          else
            az ml online-endpoint create \
              --file mlops/pipelines/online-endpoint.yml \
              --name "$ENDPOINT_NAME"
          fi

          if az ml online-deployment show --name "$DEPLOYMENT_NAME" --endpoint-name "$ENDPOINT_NAME" >/dev/null 2>&1; then
            az ml online-deployment update \
              --file mlops/pipelines/online-deployment.yml \
              --name "$DEPLOYMENT_NAME" \
              --endpoint-name "$ENDPOINT_NAME"
          else
            az ml online-deployment create \
              --file mlops/pipelines/online-deployment.yml \
              --name "$DEPLOYMENT_NAME" \
              --endpoint-name "$ENDPOINT_NAME"
          fi

          az ml online-endpoint update --name "$ENDPOINT_NAME" --traffic "$DEPLOYMENT_NAME=100"

      - name: Invoke endpoint smoke test
        run: |
          TARGET="${{ github.event.inputs.target_env }}"
          ENDPOINT_NAME="iris-endpoint-${TARGET}"
          DEPLOYMENT_NAME="iris-deployment-${TARGET}"
          REQUEST_FILE=$(mktemp /tmp/iris-request-XXXXXX.json)

          cat > "$REQUEST_FILE" <<'JSON'
          {"data": [[5.1, 3.5, 1.4, 0.2]]}
          JSON

          az ml online-endpoint invoke \
            --name "$ENDPOINT_NAME" \
            --deployment-name "$DEPLOYMENT_NAME" \
            --request-file "$REQUEST_FILE"

          az ml online-endpoint show --name "$ENDPOINT_NAME" --query "{name:name, scoring_uri:scoring_uri}" -o table
