name: Ops — Bootstrap AML Assets

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options: [dev, prod]
      run_health_check:
        description: "Run AML health-check job"
        required: true
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env == 'prod' && 'production' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve AML context
        run: |
          if [ "${{ github.event.inputs.target_env }}" = "prod" ]; then
            echo "AML_RESOURCE_GROUP=${{ secrets.AML_RESOURCE_GROUP_PROD }}" >> $GITHUB_ENV
            echo "AML_WORKSPACE=${{ secrets.AML_WORKSPACE_PROD }}" >> $GITHUB_ENV
          else
            echo "AML_RESOURCE_GROUP=${{ secrets.AML_RESOURCE_GROUP_DEV }}" >> $GITHUB_ENV
            echo "AML_WORKSPACE=${{ secrets.AML_WORKSPACE_DEV }}" >> $GITHUB_ENV
          fi

      - name: Bootstrap AML assets
        run: |
          bash scripts/bootstrap-aml.sh \
            "${{ github.event.inputs.target_env }}" \
            "$AML_RESOURCE_GROUP" \
            "$AML_WORKSPACE" \
            "${{ github.event.inputs.run_health_check }}"
