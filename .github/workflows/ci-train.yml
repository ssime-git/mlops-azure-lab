name: CI — Lint + Tests + AML Training Pipeline

on:
  push:
    branches: [main, dev]
    paths: ['mlops/**', 'tests/**', 'requirements.txt', 'requirements.in']
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: "3.10"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - run: uv pip install --system -r requirements.txt
      - run: uv run black --check mlops/ tests/
      - run: uv run flake8 mlops/ tests/ --max-line-length=100

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - run: uv pip install --system -r requirements.txt
      - run: uv run pytest tests/ -v --tb=short

  train-pipeline:
    runs-on: ubuntu-latest
    needs: unit-tests
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install AML CLI v2
        run: az extension add -n ml --yes

      - name: Configure AML defaults
        run: |
          az configure --defaults \
            group=${{ secrets.AML_RESOURCE_GROUP_DEV }} \
            workspace=${{ secrets.AML_WORKSPACE_DEV }}

      - name: Create or update AML environment
        run: az ml environment create --file mlops/data-science/environment/train-env.yml

      - name: Create compute cluster if not exists
        run: |
          if ! az ml compute show --name cpu-cluster >/dev/null 2>&1; then
            az ml compute create \
              --name cpu-cluster \
              --type amlcompute \
              --min-instances 0 \
              --max-instances 4 \
              --size Standard_DS3_v2
          fi

      - name: Submit AML training pipeline
        id: submit
        run: |
          RUN_ID=$(az ml job create \
            --file mlops/pipelines/pipeline.yml \
            --query name -o tsv)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Wait for pipeline completion
        run: |
          az ml job stream --name ${{ steps.submit.outputs.run_id }}
          STATUS=$(az ml job show --name ${{ steps.submit.outputs.run_id }} --query status -o tsv)
          [ "$STATUS" = "Completed" ] || { echo "Pipeline failed: $STATUS"; exit 1; }
